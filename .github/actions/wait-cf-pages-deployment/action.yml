name: Validate Cloudflare Pages deployment
description: Validate Cloudflare Pages deployment

inputs:
  github-token:
    description: GitHub token
    required: false

runs:
  using: 'composite'
  steps:
    - name: Wait for Cloudflare Pages deployment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const maxAttempts = 9; // 2 minutes with 15 second intervals
          const intervalSeconds = 15;

          for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            console.log(`Attempt ${attempt}/${maxAttempts}: Checking for Cloudflare Pages deployment...`);

            // Check for check runs
            

            const { data: cfDeployCheckInQueued } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.after || context.sha,
              check_name: "Cloudflare Pages",
              status: "queued"
            });

            console.log('==========================');
            console.log(JSON.stringify(cfDeployCheckInQueued.total_count));
            console.log('==========================');

            if (cfDeployCheckInQueued.total_count) {
              console.log("Cloudflare Pages deployment is in progress. Waiting...");
              await new Promise(resolve => setTimeout(resolve, intervalSeconds * 1000));
              continue;
            }

            const { data: cfDeployCheckInProgress } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.after || context.sha,
              check_name: "Cloudflare Pages",
              status: "in_progress"
            });


            console.log('==========================');
            console.log(JSON.stringify(cfDeployCheckInProgress.total_count));
            console.log('==========================');

            if (cfDeployCheckInProgress.total_count) {
              console.log("Cloudflare Pages deployment is in progress. Waiting...");
              await new Promise(resolve => setTimeout(resolve, intervalSeconds * 1000));
              continue;
            }

            const { data: cfDeployCheckCompleted } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.after || context.sha,
              check_name: "Cloudflare Pages",
              status: "completed"
            });

            console.log('==========================');
            console.log(JSON.stringify(cfDeployCheckCompleted.total_count));
            console.log('==========================');

            if (cfDeployCheckCompleted.total_count) {
              const [cfCheck] = cfDeployCheckCompleted.check_runs;
              console.log(`Found Cloudflare Pages check: ${cfCheck.name}`);
              if (cfCheck.conclusion === "success") {
                console.log("✓ Cloudflare Pages deployment successful!");
                break;
              } else {
                throw new Error(`Cloudflare Pages deployment failed with conclusion: ${cfCheck.conclusion}`);
              }
            } else if (attempt < maxAttempts) {
              console.log(`Retrying in ${intervalSeconds} seconds to check status for Cloudflare deployment...`);
              await new Promise(resolve => setTimeout(resolve, intervalSeconds * 1000));
            } else {
              throw new Error("Timeout: Cloudflare Pages deployment did not complete in time");
            }
          }