name: Lint Workflows
description: Lint GitHub Actions workflows using actionlint. (Place it after repository checkout step.)
runs:
  using: 'composite'
  steps:
    - name: Download actionlint
      id: get_actionlint
      run: bash <(curl -fsSL
        https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      shell: bash

    - name: Run actionlint
      run: ${{ steps.get_actionlint.outputs.executable }} -color
      shell: bash
