name: Reusable Publish to npm

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        type: number
        default: 24
      use-lerna:
        description: 'Use Lerna for versioning and publishing (set false for simple repos)'
        type: boolean
        default: true
      run-unit-test:
        description: 'Run unit tests'
        type: boolean
        default: true
      run-build:
        description: 'Run build'
        type: boolean
        default: true
      run-lint:
        description: 'Run lint'
        type: boolean
        default: true
      run-format-check:
        description: 'Run format check'
        type: boolean
        default: true
      run-typecheck:
        description: 'Run typecheck'
        type: boolean
        default: true
    secrets:
      npm-token:
        description: 'NPM token for publishing packages'
        required: true
      github-token:
        description: 'GitHub token for pushing version commits and tags'
        required: true

permissions:
  contents: write

jobs:
  version-and-publish:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.github-token }}

      - name: Lint workflows
        uses: jabranr/workflows/.github/actions/actionlint@main

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        if: ${{ inputs.run-build }}
        run: npm run build

      - name: Run unit tests
        if: ${{ inputs.run-unit-test }}
        run: npm test

      - name: Run lint
        if: ${{ inputs.run-lint }}
        run: npm run lint

      - name: Run format check
        if: ${{ inputs.run-format-check }}
        run: npm run format:check

      - name: Run typecheck
        if: ${{ inputs.run-typecheck }}
        run: npm run typecheck

      - name: configure git
        run: |
          git config --global --add safe.directory '*'
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: version packages with Lerna (monorepo)
        if: ${{ inputs.use-lerna }}
        run: npx lerna version --conventional-commits --yes
        env:
          GH_TOKEN: ${{ secrets.github-token }}

      - name: publish to npm with Lerna (monorepo)
        if: ${{ inputs.use-lerna }}
        run: npx lerna publish from-git --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}

      - name: version package with npm (simple repo)
        if: ${{ !inputs.use-lerna }}
        run: |
          BUMP=$(npx conventional-recommended-bump -p angular)
          npm version "$BUMP"

      - name: push version commit and tag (simple repo)
        if: ${{ !inputs.use-lerna }}
        run: |
          git push
          git push --tags

      - name: publish to npm (simple repo)
        if: ${{ !inputs.use-lerna }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}
