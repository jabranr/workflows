name: Reusable Integration Tests

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        type: string
        default: '24.15.0'
      test-type:
        description: 'Type of tests to run (functional, e2e, smoke, vr)'
        type: string
        default: functional
      timeout-minutes:
        description: 'Timeout in minutes'
        type: number
        default: 60
      reports-retention-days:
        description: 'Reports retention in days'
        type: number
        default: 7

permissions:
  contents: read

jobs:
  integration:
    name: ${{ inputs.test-type }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate test-type input
        run: |
          case "${{ inputs.test-type }}" in
            functional|e2e|smoke|vr) ;;
            *) echo "::error::Unsupported test-type: ${{ inputs.test-type }} (expected one of: functional, e2e, smoke, vr)"; exit 1 ;;
          esac

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = 'true' ]; then
            npx playwright install-deps
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run ${{ inputs.test-type }} tests
        env:
          CI: true
        run: npm run test:${{ inputs.test-type }}

      - name: Save test reports
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ inputs.test-type }}
          path: playwright-report-${{ inputs.test-type }}/
          retention-days: ${{ inputs.reports-retention-days }}
